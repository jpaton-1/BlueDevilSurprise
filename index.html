<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Duke Chapel AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; }

    /* ── iOS: full-screen tap gate to unlock compass ──────────── */
    #tap-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #tap-gate .icon { font-size: 52px; }
    #tap-gate .label { font-size: 19px; font-weight: 600; }
    #tap-gate .sub   { font-size: 13px; opacity: 0.55; }

    /* ── Navigation overlay (lives above the AR canvas) ──────── */
    #nav {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    /* Arrow circle */
    #arrow-ring {
      transition: opacity 0.8s ease;
    }

    /* Distance pill */
    #dist-pill {
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      padding: 11px 28px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: opacity 0.8s ease;
    }

    /* Arrived banner */
    #arrived {
      display: none;
      background: rgba(0, 48, 135, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.18);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* Waiting state (no GPS / compass yet) */
    #waiting {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      z-index: 300;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
  </style>
</head>
<body>

  <!-- iOS tap gate (hidden instantly on Android) -->
  <div id="tap-gate" onclick="grantPermission()">
    <div class="icon">🧭</div>
    <div class="label">Tap to enable compass</div>
    <div class="sub">Required for AR navigation</div>
  </div>

  <!-- Directional overlay -->
  <div id="nav">
    <!-- SVG: fixed ring, rotating arrow inside -->
    <svg id="arrow-ring" width="190" height="190" viewBox="-95 -95 190 190">
      <!-- Ring background -->
      <circle r="88" fill="rgba(0,0,0,0.48)" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
      <!-- Subtle tick marks for N/E/S/W -->
      <line x1="0" y1="-75" x2="0" y2="-65" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <line x1="0" y1="75"  x2="0" y2="65"  stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <line x1="-75" y1="0" x2="-65" y2="0" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <line x1="75"  y1="0" x2="65"  y2="0" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <!-- Rotating arrow (transform set by JS) -->
      <g id="arrow-inner">
        <!-- Arrow body -->
        <polygon
          points="0,-56 26,-16 13,-16 13,44 -13,44 -13,-16 -26,-16"
          fill="white"
          filter="url(#glow)"/>
        <!-- Small ring at tail to emphasise direction -->
        <circle cx="0" cy="44" r="6" fill="rgba(255,255,255,0.4)"/>
      </g>
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <div id="dist-pill">–– m</div>
    <div id="arrived">📍 You're at the pulpit</div>
  </div>

  <!-- Status / waiting hint -->
  <div id="waiting">Waiting for GPS and compass…</div>

  <!-- ── AR Scene ───────────────────────────────────────────────── -->
  <!--
    CALIBRATION
    ───────────
    If the 3D model appears offset when you're standing at the pulpit,
    adjust these coordinates. Triple-tap the distance pill to log your
    current GPS position to the browser console.

    latitude:  36.00149
    longitude: -78.94093

    scale="1 1 1"      → adjust if the figure is too large or small
    position="0 0 0"   → lower Y (e.g. "0 -1.5 0") to drop figure to floor height
  -->
  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true"
    embedded
    loading-screen="enabled: false">

    <a-assets>
      <a-asset-item id="model" src="blue-devil.glb"></a-asset-item>
    </a-assets>

    <a-camera gps-projected-camera rotation-reader></a-camera>

    <a-entity
      gltf-model="#model"
      gps-projected-entity-place="latitude: 36.00197; longitude: -78.94040"
      scale="1 1 1"
      position="0 0 0">
    </a-entity>

  </a-scene>

  <script>
    // ── Target ────────────────────────────────────────────────────
    const TARGET = { lat: 36.00197, lng: -78.94040 };
    const ARRIVED_M = 5; // metres — hide arrow, show arrived state

    // ── State ─────────────────────────────────────────────────────
    let compassHeading = null; // degrees, 0 = North, clockwise
    let userPos        = null; // { lat, lng }
    let smoothAngle    = null; // smoothed arrow rotation

    // ── iOS permission gate ───────────────────────────────────────
    const needsPermission =
      typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function';

    if (!needsPermission) {
      document.getElementById('tap-gate').style.display = 'none';
      boot();
    }

    async function grantPermission() {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== 'granted') return;
      } catch (e) { return; }
      document.getElementById('tap-gate').style.display = 'none';
      boot();
    }

    // ── Boot: attach sensors ──────────────────────────────────────
    function boot() {
      // Prefer absolute orientation (Android gives this); fall back to relative
      window.addEventListener('deviceorientationabsolute', onOrientation, true);
      window.addEventListener('deviceorientation',         onOrientation, true);

      navigator.geolocation.watchPosition(onGPS, onGPSError, {
        enableHighAccuracy: true,
        maximumAge: 0
      });
    }

    // ── Compass ───────────────────────────────────────────────────
    function onOrientation(e) {
      if (e.webkitCompassHeading != null) {
        // iOS — direct magnetic heading
        compassHeading = e.webkitCompassHeading;
      } else if (e.alpha != null) {
        // Android — alpha is CCW from North, invert to get CW heading
        compassHeading = (360 - e.alpha) % 360;
      }
      tick();
    }

    // ── GPS ───────────────────────────────────────────────────────
    function onGPS(pos) {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      tick();
    }
    function onGPSError() { /* waiting label stays visible */ }

    // ── Haversine distance (metres) ───────────────────────────────
    function distanceTo(lat1, lng1, lat2, lng2) {
      const R = 6_371_000;
      const r  = Math.PI / 180;
      const dL = (lat2 - lat1) * r;
      const dG = (lng2 - lng1) * r;
      const a  = Math.sin(dL/2)**2 +
                 Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dG/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ── Bearing from A to B (degrees 0–360) ──────────────────────
    function bearingTo(lat1, lng1, lat2, lng2) {
      const r  = Math.PI / 180;
      const dG = (lng2 - lng1) * r;
      const y  = Math.sin(dG) * Math.cos(lat2 * r);
      const x  = Math.cos(lat1*r) * Math.sin(lat2*r) -
                 Math.sin(lat1*r) * Math.cos(lat2*r) * Math.cos(dG);
      return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

    // ── Smooth angle that wraps correctly through 0/360 ──────────
    function lerpAngle(a, b, t) {
      const diff = ((b - a + 540) % 360) - 180;
      return (a + diff * t + 360) % 360;
    }

    // ── Main update ───────────────────────────────────────────────
    function tick() {
      if (!userPos || compassHeading === null) return;

      const dist  = distanceTo(userPos.lat, userPos.lng, TARGET.lat, TARGET.lng);
      const bear  = bearingTo(userPos.lat, userPos.lng, TARGET.lat, TARGET.lng);
      const angle = (bear - compassHeading + 360) % 360;

      smoothAngle = smoothAngle === null ? angle : lerpAngle(smoothAngle, angle, 0.18);

      const arrowRing = document.getElementById('arrow-ring');
      const distPill  = document.getElementById('dist-pill');
      const arrived   = document.getElementById('arrived');
      const waiting   = document.getElementById('waiting');

      // Hide waiting label once we have data
      waiting.style.opacity = '0';

      if (dist <= ARRIVED_M) {
        arrowRing.style.opacity = '0';
        distPill.style.opacity  = '0';
        arrived.style.display   = 'block';
      } else {
        arrowRing.style.opacity = '1';
        distPill.style.opacity  = '1';
        arrived.style.display   = 'none';

        document.getElementById('arrow-inner')
          .setAttribute('transform', `rotate(${smoothAngle.toFixed(1)})`);

        const feet = dist * 3.28084;
        distPill.textContent = feet < 528
          ? `${Math.round(feet)} ft to pulpit`
          : `${(feet / 5280).toFixed(2)} mi to pulpit`;
      }
    }

    // Run tick on a fallback interval in case sensor events stall
    setInterval(tick, 250);

    // Triple-tap distance pill to log current GPS to console (calibration aid)
    let tapCount = 0, tapReset;
    document.getElementById('dist-pill').addEventListener('click', () => {
      tapCount++;
      clearTimeout(tapReset);
      tapReset = setTimeout(() => tapCount = 0, 700);
      if (tapCount >= 3 && userPos) {
        console.log(`Current GPS → lat: ${userPos.lat.toFixed(7)}, lng: ${userPos.lng.toFixed(7)}`);
        tapCount = 0;
      }
    });
    document.getElementById('dist-pill').style.pointerEvents = 'auto';
  </script>

</body>
</html>
